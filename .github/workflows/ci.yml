name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Testar código
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar imports
        run: |
          python -c "from src.extract.extract import extrair_dados_crypto"
          python -c "from src.transform.transform import ler_dados_bronze, transformar_dados"
          python -c "from src.aggregate.aggregate import ler_dados_prata, agregar_metricas"
          python -c "from src.load.load import salva_na_bronze, salva_na_prata, salva_na_ouro"

      - name: Verificar sintaxe da DAG
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          exec(open('dags/crypto_pipeline_dag.py').read())
          print('DAG carregada com sucesso')
          "

      - name: Verificar estrutura do projeto
        run: |
          python -c "
          import os

          arquivos_obrigatorios = [
              'src/extract/extract.py',
              'src/transform/transform.py',
              'src/aggregate/aggregate.py',
              'src/load/load.py',
              'dags/crypto_pipeline_dag.py',
              'requirements.txt',
              'docker-compose.yaml'
          ]

          for arquivo in arquivos_obrigatorios:
              if not os.path.exists(arquivo):
                  raise FileNotFoundError(f'Arquivo obrigatório não encontrado: {arquivo}')
              print(f'OK: {arquivo}')

          print('Estrutura do projeto validada com sucesso')
          "